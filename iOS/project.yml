name: Detailing Checklist
options:
  bundleIdPrefix: com.shimondeitel.detailcheck
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Detailing Checklist:
    type: application
    platform: iOS
    sources:
      - path: Detailing Checklist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.detailcheck
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Detailing Checklist/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Detailing ChecklistTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Detailing ChecklistTests
      - path: Detailing Checklist.storekit
    dependencies:
      - target: Detailing Checklist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.detailcheck.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Detailing ChecklistUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Detailing ChecklistUITests
    dependencies:
      - target: Detailing Checklist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.detailcheck.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Detailing Checklist:
    build:
      targets:
        Detailing Checklist: all
        Detailing ChecklistTests: [test]
        Detailing ChecklistUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Detailing Checklist.storekit
    test:
      config: Debug
      storeKitConfiguration: Detailing Checklist.storekit
      targets:
        - Detailing ChecklistTests
        - Detailing ChecklistUITests
    archive:
      config: Release
